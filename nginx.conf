server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx's bundled mime.types has no .mjs entry, so the service worker
    # (wallet-service-worker.mjs) is served as application/octet-stream and
    # browsers refuse to register it ("unsupported MIME type"). Force a JS
    # MIME type. The service-worker filename isn't content-hashed, so it must
    # not be cached immutably or clients would never pick up an update.
    location ~ \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

name: Playwright Tests
on:
  workflow_dispatch:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Install dependencies
      run: pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Install Nigiri
      run: |
        curl -sL https://github.com/vulpemventures/nigiri/releases/latest/download/nigiri-linux-amd64 -o /usr/local/bin/nigiri
        chmod +x /usr/local/bin/nigiri
        mkdir -p ~/.nigiri && chmod -R 777 ~/.nigiri
        nigiri version
    - name: Start Nigiri
      run: |
        for i in 1 2 3; do
          nigiri start --ci --ln && exit 0
          echo "Attempt $i failed, retrying in 10s..."
          nigiri stop --delete 2>/dev/null || true
          sleep 10
        done
        echo "Nigiri failed to start after 3 attempts"
        exit 1
    - name: Setup regtest environment
      run: pnpm regtest
    - name: Run Playwright tests
      run: sleep 5 && pnpm run test:e2e
      env:
        CI: true

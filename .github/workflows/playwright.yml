name: Playwright Tests
on:
  workflow_dispatch:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]
jobs:
  test:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Install dependencies
      run: pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install chrome chromium --with-deps
    - name: Start regtest environment
      run: node regtest/regtest.mjs start --env .env.regtest
    - name: Start nostr relay
      run: docker compose -f docker-compose.nak.yml up -d --build
    - name: Verify environment
      run: pnpm regtest:setup
    - name: Run Playwright tests
      run: sleep 5 && pnpm run test:e2e
      env:
        CI: true
    - name: Capture logs on failure
      if: failure()
      run: |
        echo "=== docker ps ==="
        docker ps --format "table {{.Names}}\t{{.Status}}" || true
        echo "=== boltz logs (last 50) ==="
        docker logs boltz 2>&1 | tail -50 || true
        echo "=== arkd logs (last 50) ==="
        docker logs arkd 2>&1 | tail -50 || true
    - name: Cleanup
      if: always()
      run: |
        docker compose -f docker-compose.nak.yml down -v 2>/dev/null || true
        node regtest/regtest.mjs clean --env .env.regtest

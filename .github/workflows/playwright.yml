name: Playwright Tests
on:
  workflow_dispatch:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]
jobs:
  test:
    name: E2E (${{ matrix.group }} / ${{ matrix.project }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ["Mobile Chrome", "Google Chrome"]
        group: [assets-send, core]
        include:
          - group: assets-send
            test_files: >-
              src/test/e2e/asset.test.ts
              src/test/e2e/send.test.ts
          - group: core
            test_files: >-
              src/test/e2e/backup.test.ts
              src/test/e2e/bip21.test.ts
              src/test/e2e/delegate.test.ts
              src/test/e2e/form.test.ts
              src/test/e2e/init.test.ts
              src/test/e2e/keyboard.test.ts
              src/test/e2e/lnurl.test.ts
              src/test/e2e/lock.test.ts
              src/test/e2e/nostr.test.ts
              src/test/e2e/pwa.test.ts
              src/test/e2e/receive.test.ts
              src/test/e2e/restore.test.ts
              src/test/e2e/serverdown.test.ts
              src/test/e2e/swap.test.ts
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Install dependencies
      run: pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install chrome chromium --with-deps
    - name: Start regtest environment
      run: node regtest/regtest.mjs start --env .env.regtest
    - name: Start nostr relay
      run: docker compose -f docker-compose.nak.yml up -d --build
    - name: Verify environment
      run: pnpm regtest:setup
    - name: Run Playwright tests
      run: sleep 5 && pnpm run test:e2e --project="${{ matrix.project }}" ${{ matrix.test_files }}
      env:
        CI: true
    - name: Capture logs on failure
      if: failure()
      run: |
        echo "=== docker ps ==="
        docker ps --format "table {{.Names}}\t{{.Status}}" || true
        echo "=== boltz logs (last 50) ==="
        docker logs boltz 2>&1 | tail -50 || true
        echo "=== arkd logs (last 50) ==="
        docker logs arkd 2>&1 | tail -50 || true
    - name: Cleanup
      if: always()
      run: |
        docker compose -f docker-compose.nak.yml down -v 2>/dev/null || true
        node regtest/regtest.mjs clean --env .env.regtest

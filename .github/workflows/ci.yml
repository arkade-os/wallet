name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, next ]
  pull_request:
    branches: [ master, next ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # 24 satisfies the wallet engines (>=22.12) and the arkade-os/ts-sdk
        # monorepo's build engine (>=24.15 <25), which we build from source below.
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v3
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # Temporary: build @arkade-os/sdk + @arkade-os/boltz-swap from the git ref
    # pinned in package.json ("arkadeSdk") into vendor/*.tgz before install, so
    # the file: dependencies resolve. Remove once the SDK is published to npm.
    - name: Build Arkade SDK from pinned git ref
      run: node scripts/prepare-arkade-sdk.js

    - name: Install dependencies
      # .npmrc sets frozen-lockfile=false: the vendor/*.tgz above are rebuilt
      # from source and are not byte-reproducible, so their lockfile integrity
      # is not stable.
      run: pnpm install
    
    - name: Run formatter
      run: pnpm format:check

    - name: Run linter
      run: pnpm lint

    - name: Run build
      run: pnpm build 
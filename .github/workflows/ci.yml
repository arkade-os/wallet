name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, next ]
  pull_request:
    branches: [ master, next ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # 24 satisfies the wallet engines (>=22.12) and the arkade-os/ts-sdk
        # monorepo's build engine (>=24.15 <25), which we build from source below.
        node-version: '24'

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v3
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # Temporary: the wallet consumes an unpublished @arkade-os/sdk +
    # @arkade-os/boltz-swap (arkade-os/ts-sdk PR #554). Build them from the ref
    # pinned in package.json (arkadeSdk) into vendor/*.tgz, which the file:
    # dependencies below resolve. Remove this step once the SDK is published.
    - name: Build Arkade SDK from pinned git ref
      run: node scripts/prepare-arkade-sdk.js

    - name: Install dependencies
      run: pnpm install
    
    - name: Run formatter
      run: pnpm format:check

    - name: Run linter
      run: pnpm lint

    - name: Run build
      run: pnpm build 
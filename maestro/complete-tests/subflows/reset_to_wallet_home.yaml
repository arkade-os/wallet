appId: com.android.chrome
---
# Return to wallet home. No evalScript — device Chrome (see flows/01_startup_restore.yaml).

- runFlow: dismiss_clipboard_permission.yaml

- runFlow:
    when:
      visible: "DFX"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_2s.yaml

- runFlow:
    when:
      visible: "Connecting to DFX"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_2s.yaml

- runFlow:
    when:
      visible: "Copy address"
    commands:
      - runFlow: close_copy_sheet.yaml

- runFlow:
    when:
      visible: "Swaps are coming soon"
    commands:
      - tapOn:
          point: "50%, 88%"
          waitToSettleTimeoutMs: 800
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      visible: "Recipient address"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      visible: "Add amount"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      visible: "Activity"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      visible: "Settings"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      visible: "Balance display"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_1s.yaml

- runFlow:
    when:
      notVisible: "^Receive$"
    commands:
      - runFlow: tap_header_back.yaml
      - runFlow: ../../subflows/wait_2s.yaml

- runFlow: ../../subflows/wait_2s.yaml

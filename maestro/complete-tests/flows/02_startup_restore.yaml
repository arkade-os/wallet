appId: com.android.chrome
name: Startup Restore
tags:
  - startup
  - restore
  - onboarding-chain
---
# Startup restore — reference pattern for coordinate-based flows.
# After 01_fresh_wallet or reset (test 15). Welcome screen.

- runFlow: ../subflows/open_wallet_url.yaml

# --- Cancel path (taps 1–5) ---
- tapOn:
    point: "64%, 90%"
- runFlow: ../subflows/wait_2s.yaml
- tapOn:
    point: "89%, 69%"
- runFlow: ../subflows/wait_2s.yaml
- tapOn:
    point: "65%, 91%"
- runFlow: ../subflows/wait_1s.yaml
- tapOn:
    point: "81%, 89%"
- runFlow: ../subflows/wait_2s.yaml
- tapOn:
    point: "76%, 91%"
- runFlow: ../subflows/wait_5s.yaml

# --- Back path (taps 6–8) ---
- tapOn:
    point: "62%, 91%"
- runFlow: ../subflows/wait_1s.yaml
- tapOn:
    point: "71%, 89%"
- runFlow: ../subflows/wait_1s.yaml
- tapOn:
    point: "4%, 14%"
- runFlow: ../subflows/wait_4s.yaml

# --- Restore with private key (taps 9–11, 18–19) ---
- tapOn:
    point: "63%, 91%"
- runFlow: ../subflows/wait_1s.yaml
- tapOn:
    point: "74%, 89%"
- runFlow: ../subflows/wait_1s.yaml
- tapOn:
    point: "16%, 28%"
- runFlow: ../subflows/wait_2s.yaml
- runFlow: ../subflows/_input_wallet_nsec.yaml
- runFlow: ../subflows/wait_2s.yaml
- tapOn:
    point: "73%, 96%"
- runFlow: ../subflows/wait_2s.yaml
- tapOn:
    point: "65%, 85%"

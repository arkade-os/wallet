appId: com.android.chrome
name: Home — Swap shows Coming Soon
tags:
  - smoke
  - home-redesign
---
- runFlow: ../subflows/ensure_on_wallet_home.yaml
- runFlow: ../subflows/tap_home_swap.yaml
- runFlow: ../subflows/wait_2s.yaml
- assertVisible: "Coming Soon"
- tapOn:
    point: "50%, 88%"
    waitToSettleTimeoutMs: 800
- runFlow: ../subflows/wait_2s.yaml

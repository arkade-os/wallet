name: nigiri
services:
  price-mock:
    image: python:3.12-alpine
    container_name: price-mock
    restart: unless-stopped
    command: ['python', '/app/price.py']
    volumes:
      - ./regtest-mocks/price.py:/app/price.py:ro
    ports:
      - '9099:9099'

  introspector:
    image: ghcr.io/arklabshq/introspector:v0.0.1
    container_name: introspector
    restart: unless-stopped
    ports:
      - '7073:7073'
    environment:
      # Public key has odd y; matches the bancod e2e default.
      - INTROSPECTOR_SECRET_KEY=5646b2e23bbb82491fb4ef262079ff17594d5e873fc6bcea5f1453edbe1029b1
      - INTROSPECTOR_NO_TLS=true
      - INTROSPECTOR_LOG_LEVEL=5
      - INTROSPECTOR_ARKD_URL=arkd:7070
    volumes:
      - type: tmpfs
        target: /app/data

  bancod:
    image: ghcr.io/arkade-os/bancod:v0.0.1-rc.1
    container_name: bancod
    restart: unless-stopped
    depends_on:
      - introspector
    ports:
      - '7090:7090'
      - '7091:7091'
    environment:
      - BANCOD_ARK_URL=arkd:7070
      - BANCOD_INTROSPECTOR_URL=introspector:7073
      # Deterministic regtest seed — never reuse outside regtest.
      - BANCOD_WALLET_SEED=2d97a96b78ea1e90c4cf2b9b7e3d8b94b1d24b6d4c0f9f0b6c1f4aa7c0e1de23
      - BANCOD_WALLET_PASSWORD=password
      - BANCOD_GRPC_PORT=7090
      - BANCOD_HTTP_PORT=7091
      - BANCOD_LOG_LEVEL=5
      - BANCOD_BANCO_ENABLED=true
    volumes:
      - type: tmpfs
        target: /app/data

networks:
  default:
    name: nigiri
    external: true
